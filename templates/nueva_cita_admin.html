<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Cita Manual - Barbería</title>
    <style>
        * { box-sizing: border-box; }

        body {
            background: #0b0b0c;
            color: #f5f5f5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 24px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            margin: 0;
            font-size: 42px;
            color: #d4af37;
            font-weight: 800;
            line-height: 1.05;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .subtitulo {
            color: #9ca3af;
            margin-top: 10px;
            font-size: 16px;
        }

        .filtros {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filtros button {
            border: none;
            border-radius: 14px;
            padding: 14px 20px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            background: #1e1f22;
            color: #fff;
        }

        .filtros button.activo {
            background: #d4af37;
            color: #000;
        }

        .panel-crear {
            background: #161719;
            border: 1px solid #27272a;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,.22);
            padding: 24px;
        }

        .panel-crear h2 {
            margin: 0 0 18px 0;
            color: #d4af37;
            font-size: 30px;
            font-weight: 800;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            color: #d4af37;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: #202124;
            color: #fff;
            border: 1px solid #34363b;
            border-radius: 14px;
            padding: 14px;
            font-size: 15px;
            outline: none;
        }

        .form-group textarea {
            min-height: 95px;
            resize: vertical;
        }

        .btn-crear {
            width: 100%;
            background: #d4af37;
            color: #111;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
        }

        #mensaje-container {
            position: sticky;
            top: 14px;
            z-index: 20;
            margin-bottom: 16px;
        }

        .mensaje {
            padding: 14px 16px;
            border-radius: 14px;
            font-weight: 700;
            border: 1px solid transparent;
        }

        .mensaje.exito {
            background: rgba(22, 163, 74, 0.16);
            color: #bbf7d0;
            border-color: rgba(22, 163, 74, 0.35);
        }

        .mensaje.error {
            background: rgba(220, 38, 38, 0.16);
            color: #fecaca;
            border-color: rgba(220, 38, 38, 0.35);
        }
    </style>
</head>
<body>
<div class="container">
    <div id="mensaje-container"></div>

    <div class="topbar">
        <div>
            <h1>Nueva cita manual</h1>
            <div class="subtitulo">Crea citas manuales usando horas realmente disponibles</div>
        </div>

        <div class="filtros">
            <button type="button" onclick="window.location.href='/dueno'">Inicio</button>
            <button type="button" class="activo" onclick="window.location.href='/dueno/nueva-cita'">Nueva cita</button>
        </div>
    </div>

    <div class="panel-crear">
        <h2>Registrar cita</h2>

        <div class="form-grid">
            <div class="form-group">
                <label for="barbero_manual">Barbero:</label>
                <select id="barbero_manual">
                    <option value="">Selecciona barbero</option>
                    {% for barbero in barberos_info %}
                    <option value="{{ barbero.id }}">{{ barbero.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="fecha_manual">Fecha:</label>
                <input type="date" id="fecha_manual" value="{{ hoy }}" min="{{ hoy }}">
            </div>

            <div class="form-group">
                <label for="hora_manual">Hora:</label>
                <select id="hora_manual">
                    <option value="">Selecciona una hora</option>
                </select>
            </div>

            <div class="form-group">
                <label for="servicio_manual">Servicio:</label>
                <select id="servicio_manual">
                    <option value="">Selecciona servicio</option>
                    {% for nombre in servicios.keys() %}
                    <option value="{{ nombre }}">{{ nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="duracion_manual">Duración:</label>
                <select id="duracion_manual">
                    <option value="">Usar duración del servicio</option>
                    <option value="30">30 minutos</option>
                    <option value="60">60 minutos</option>
                    
                </select>
            </div>

            <div class="form-group">
                <label for="cliente_manual">Nombre cliente:</label>
                <input type="text" id="cliente_manual" value="Cliente presencial">
            </div>

            <div class="form-group" style="grid-column: 1 / -1;">
                <label for="observacion_manual">Observación:</label>
                <textarea id="observacion_manual" placeholder="Notas adicionales..."></textarea>
            </div>
        </div>

        <button type="button" class="btn-crear" onclick="crearCitaManual(this)">CREAR CITA MANUAL</button>
    </div>
</div>

<script>
function mostrarMensaje(texto, tipo) {
    const cont = document.getElementById('mensaje-container');
    cont.innerHTML = `<div class="mensaje ${tipo}">${texto}</div>`;
    setTimeout(() => { cont.innerHTML = ''; }, 4000);
}

async function cargarHorasManual() {
    const barbero_id = document.getElementById('barbero_manual').value;
    const fecha = document.getElementById('fecha_manual').value;
    const servicio = document.getElementById('servicio_manual').value;
    const horaSelect = document.getElementById('hora_manual');

    horaSelect.innerHTML = '<option value="">Selecciona una hora</option>';

    if (!barbero_id || !fecha || !servicio) return;

    try {
       const res = await fetch(`/horas_admin?fecha=${fecha}&barbero_id=${barbero_id}&servicio=${encodeURIComponent(servicio)}`);
        const horas = await res.json();

        if (!Array.isArray(horas)) return;

        horas.forEach(hora => {
            const option = document.createElement('option');
            option.value = hora;
            option.textContent = hora.toUpperCase();
            horaSelect.appendChild(option);
        });
    } catch (e) {
        console.error('Error cargando horas manuales:', e);
    }
}

async function crearCitaManual(btn) {
    const barbero_id = document.getElementById('barbero_manual').value;
    const fecha = document.getElementById('fecha_manual').value;
    const hora = document.getElementById('hora_manual').value;
    const servicio = document.getElementById('servicio_manual').value;
    const duracion = document.getElementById('duracion_manual').value;
    const cliente_nombre = document.getElementById('cliente_manual').value.trim() || 'Cliente presencial';
    const observacion = document.getElementById('observacion_manual').value.trim();

    if (!barbero_id || !fecha || !hora) {
        mostrarMensaje('Completa barbero, fecha y hora.', 'error');
        return;
    }

    const textoOriginal = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = 'CREANDO CITA...';

    try {
        const res = await fetch('/api/cita_manual', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                barbero_id,
                fecha,
                hora,
                servicio,
                duracion,
                cliente_nombre,
                observacion
            })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
            throw new Error(data.error || 'No se pudo crear la cita manual');
        }

        mostrarMensaje('Cita manual creada correctamente', 'exito');
        setTimeout(() => {
            window.location.href = '/dueno';
        }, 800);
    } catch (e) {
        btn.disabled = false;
        btn.innerHTML = textoOriginal;
        mostrarMensaje(e.message, 'error');
        console.error(e);
    }
}

document.getElementById('barbero_manual')?.addEventListener('change', cargarHorasManual);
document.getElementById('fecha_manual')?.addEventListener('change', cargarHorasManual);
document.getElementById('servicio_manual')?.addEventListener('change', cargarHorasManual);
</script>
</body>
</html>
